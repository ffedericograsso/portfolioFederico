  <!-- CONTATTI -->

    <div class="contact-header">
      <h1>Parliamone</h1>
      <p>Hai un progetto in mente? Scrivimi e lo realizziamo insieme.</p>

    <div class="contact-layout">

      <!-- FORM -->
      <form class="contact-form" id="contact-form" novalidate>
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Il tuo nome" autocomplete="name" />

        <div class="form-group">

          <input type="email" id="email" name="email" placeholder="la-tua@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="messaggio">Messaggio</label>
          <textarea id="messaggio" name="messaggio" rows="5" placeholder="Descrivi il tuo progetto..."></textarea>
        </div>
        <button type="submit" class="btn-primary btn-send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Invia messaggio
        </button>
      </form>

      <div class="contact-links">

        <a href="mailto:fdrcgrasso@email.com" class="contact-link-card">
          <div class="contact-link-icon">

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
  const EMAILJS_PUBLIC_KEY  = "b1xmdRDEeCGe0zZny";
  const EMAILJS_SERVICE_ID  = "service_0r7qi3d";
  const EMAILJS_TEMPLATE_ID = "template_hmtt7lc";

  emailjs.init(EMAILJS_PUBLIC_KEY);

  const form = document.getElementById("contact-form");
  const btn  = document.querySelector(".btn-send");
  const originalHTML = btn.innerHTML;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nome     = document.getElementById("nome").value.trim();
    const email    = document.getElementById("email").value.trim();
    const messaggio = document.getElementById("messaggio").value.trim();

    if (!nome || !email || !messaggio) {
      showToast("Compila tutti i campi.", "error");
      return;
    }

    // Validazione email base
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast("Inserisci un'email valida.", "error");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = "<span>Invio in corso...</span>";

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        name:    nome,
        email:   email,
        message: messaggio,
      });

      showToast("Messaggio inviato! Ti rispondo presto 🎉", "success");
      form.reset();

    } catch (err) {
      console.error("EmailJS error:", err);
      showToast("Errore nell'invio. Riprova più tardi.", "error");

    } finally {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  function showToast(msg, type) {
    const toast = document.createElement("div");
    toast.className = "toast toast--" + type;
    toast.textContent = msg;
    document.body.appendChild(toast);

    requestAnimationFrame(() => toast.classList.add("toast--visible"));

    setTimeout(() => {
      toast.classList.remove("toast--visible");
      setTimeout(() => toast.remove(), 400);
    }, 3500);
  }
</script>
